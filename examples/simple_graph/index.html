<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Graph Visualization</title>
    <script type="text/javascript" src="../../build/graph.min.js"></script>
    <script type="text/javascript" src="simple_graph.js"></script>

    <script type="text/javascript">
        var drawing;

        function installLabelOverride(defaultFontFamily, defaultFontSize) {
            THREE.Label = function(text, parameters) {
                parameters = parameters || {};
                var labelCanvas = document.createElement("canvas");
                var xc = labelCanvas.getContext("2d");
                var fontsize = parameters.fontSize || defaultFontSize;
                var fontFamily = parameters.fontFamily || defaultFontFamily;
                var padding = 2;
                var topOffset = 6; // increase to push text down away from ceiling
                var geometry = new THREE.BoxGeometry(1, 1, 0);
                var texture = new THREE.CanvasTexture(
                    labelCanvas,
                    THREE.UVMapping,
                    THREE.ClampToEdgeWrapping,
                    THREE.ClampToEdgeWrapping,
                    THREE.LinearFilter,
                    THREE.LinearFilter
                );
                var material = new THREE.MeshBasicMaterial({map: texture, transparent: true});
                var mesh = new THREE.Mesh(geometry, material);

                function redraw() {
                    xc.font = fontsize + " " + fontFamily;
                    var textWidth = xc.measureText(text).width;
                    var cw = Math.ceil(textWidth) + padding * 2;
                    var ch = 60;
                    labelCanvas.setAttribute("width", cw);
                    labelCanvas.setAttribute("height", ch);
                    xc.font = fontsize + " " + fontFamily;
                    xc.textBaseline = "middle";
                    var r = 20;
                    xc.fillStyle = "white";
                    xc.beginPath();
                    xc.moveTo(r, 0);
                    xc.lineTo(cw - r, 0);
                    xc.quadraticCurveTo(cw, 0, cw, r);
                    xc.lineTo(cw, ch - r);
                    xc.quadraticCurveTo(cw, ch, cw - r, ch);
                    xc.lineTo(r, ch);
                    xc.quadraticCurveTo(0, ch, 0, ch - r);
                    xc.lineTo(0, r);
                    xc.quadraticCurveTo(0, 0, r, 0);
                    xc.closePath();
                    xc.fill();
                    xc.fillStyle = "black";
                    xc.fillText(text, padding, ch / 2 + topOffset);
                    mesh.geometry.dispose();
                    mesh.geometry = new THREE.BoxGeometry(cw, ch, 0);
                    texture.needsUpdate = true;
                }

                redraw();
                if (document.fonts) {
                    document.fonts.load("normal 400 54px 'OpenDyslexicCanvas'").then(function() {
                        redraw();
                    });
                }
                return mesh;
            };
        }

        function loadLabelFont(familyName) {
            if (!window.FontFace || !document.fonts) {
                return Promise.resolve();
            }
            var source = {url: "https://cdn.jsdelivr.net/gh/madjeek-web/open-dyslexic@main/OpenDyslexic-2025/opendyslexic-regular-webfont.woff2", format: "woff2"};
            var face = new FontFace(familyName, "url('" + source.url + "') format('" + source.format + "')", {style: "normal", weight: "400"});
            return face.load().then(function(loadedFace) {
                document.fonts.add(loadedFace);
                return document.fonts.load("normal 400 54px '" + familyName + "'");
            }).then(function() {
                return document.fonts.ready;
            });
        }

        function createDrawing() {
            var labelFontFamilyName = "OpenDyslexicCanvas";
            var labelFontFamily = "'" + labelFontFamilyName + "'";
            var labelFontSize = "40pt";

            function startGraph() {
                installLabelOverride(labelFontFamily, labelFontSize);
                drawing = new Drawing.SimpleGraph({
                    layout: "3d",
                    selection: true,
                    numNodes: 50,
                    graphLayout: {attraction: 5, repulsion: 0.5},
                    showStats: true,
                    showInfo: true,
                    labelFontFamily: labelFontFamily,
                    labelFontSize: labelFontSize
                });
            }

            loadLabelFont(labelFontFamilyName).then(function() {
                startGraph();
            }).catch(function() {
                startGraph();
            });
        }
    </script>

    <style type="text/css">
        @font-face {
            font-family: 'OpenDyslexicCanvas';
            src: url('https://fonts.cdnfonts.com/s/19808/OpenDyslexic-Regular.woff') format('woff'),
                 url('https://cdn.jsdelivr.net/gh/madjeek-web/open-dyslexic@main/OpenDyslexic-2025/opendyslexic-regular-webfont.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/madjeek-web/open-dyslexic@main/OpenDyslexic-2025/opendyslexic-regular-webfont.woff') format('woff');
            font-style: normal;
            font-weight: 400;
        }
        body {
            margin: 0;
            padding: 0;
            font: 11px courier;
            overflow: hidden;
        }
        #options, #options label, #options input, #options button {
            font-family: 'OpenDyslexicCanvas', Arial, sans-serif;
        }
        #graph-info {
            position: absolute;
            top: 0px;
            left: 40%;
            margin: 10px;
            background-color: #ffffe0;
            color: #333;
            padding: 5px 10px;
        }
        #options {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 10;
        }
        #edit-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #edit-popup {
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 24px;
            width: 360px;
            color: #eee;
            font-family: Arial, sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #edit-popup h3 { margin: 0 0 16px; font-size: 16px; color: #fff; }
        #edit-popup label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; }
        #edit-popup input, #edit-popup textarea {
            width: 100%; box-sizing: border-box;
            background: #0f0f1a; border: 1px solid #555; color: #fff;
            padding: 8px; border-radius: 4px; font-size: 14px; margin-bottom: 14px;
        }
        #edit-popup textarea { resize: vertical; }
        #edit-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        #edit-cancel {
            padding: 8px 16px; border: 1px solid #555;
            background: transparent; color: #aaa; border-radius: 4px; cursor: pointer;
        }
        #edit-save {
            padding: 8px 16px; border: none;
            background: #4a7cf7; color: #fff; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<div id="edit-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.55); z-index:1000; justify-content:center; align-items:center;">
    <div id="edit-popup">
        <h3>Edit Node</h3>
        <label for="edit-label">Label</label>
        <input id="edit-label" type="text" />
        <label for="edit-description">Description</label>
        <textarea id="edit-description" rows="4"></textarea>
        <div id="edit-buttons">
            <button id="edit-cancel">Cancel</button>
            <button id="edit-save">Save</button>
        </div>
    </div>
</div>
<body onload="createDrawing()">
<div id="options">
    <form>
        <p>
            <input type="checkbox" id="show_labels" onclick="if(drawing) drawing.show_labels = this.checked;">
            <label for="show_labels">Show labels</label>
        </p>
        <p>
            <input type="button" value="Stop layout" onclick="if(drawing) drawing.stop_calculating();">
        </p>
    </form>
</div>

<div style="position: absolute; bottom: 0;">
    Rotate: Left Mouse Button and Move<br />
    Zoom: Press Key S + Left Mouse Button and Move<br />
    Drag: Press Key D + Left Mouse Button and Move
</div>
</body>
</html>
